name: CI Gate - TDD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  # ============ Backend TDD ============
  backend-tdd:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: test_db
          POSTGRES_USER: test_user
          POSTGRES_PASSWORD: test_pass
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21+'

      - name: Go mod tidy
        run: go mod tidy

      - name: Run tests (TDD Red)
        run: |
          # 先运行测试，预期应该失败（如果没有实现）
          go test ./... -v -count=1 2>&1 | tee test-output.txt
          # 检查是否有测试失败（这是预期的）
          # 如果所有测试通过，说明可能缺少需要实现的测试

      - name: Check test coverage
        run: |
          go test ./... -coverprofile=coverage.out -covermode=atomic
          go tool cover -func=coverage.out

      - name: TDD Gate
        run: |
          # CI Gate: 必须满足以下条件
          # 1. 测试必须运行（不能有运行时错误）
          # 2. 覆盖率必须 > 70%
          
          COVERAGE=$(go tool cover -func=coverage.out | grep total | awk '{print $3}' | sed 's/%//')
          echo "Coverage: $COVERAGE%"
          
          if (( $(echo "$COVERAGE < 70" | bc -l) )); then
            echo "❌ CI Gate Failed: Coverage $COVERAGE% < 70%"
            exit 1
          fi
          
          echo "✅ CI Gate Passed"

  # ============ Frontend TDD ============
  frontend-tdd:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20+'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test -- --coverage --watchAll=false

      - name: TDD Gate
        run: |
          COVERAGE=$(cat coverage/coverage-summary.json | python3 -c "import sys,json; print(json.load(sys.stdin)['total']['branches']['pct'])")
          echo "Coverage: $COVERAGE%"
          
          if (( $(echo "$COVERAGE < 70" | bc -l) )); then
            echo "❌ CI Gate Failed: Coverage $COVERAGE% < 70%"
            exit 1
          fi
          
          echo "✅ CI Gate Passed"

  # ============ Integration Test ============
  integration-test:
    runs-on: ubuntu-latest
    needs: [backend-tdd, frontend-tdd]

    services:
      backend:
        image: backend-dev:latest
        ports:
          - 8080:8080

      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: test_db
          POSTGRES_USER: test_user
          POSTGRES_PASSWORD: test_pass
        ports:
          - 5432:5432

    steps:
      - uses: actions/checkout@v4

      - name: Run integration tests
        run: |
          # API 集成测试
          curl -f http://localhost:8080/health || exit 1
          
          # 运行集成测试套件
          go test ./tests/integration/... -v

  # ============ Deploy Gate ============
  deploy-gate:
    runs-on: ubuntu-latest
    needs: [integration-test]
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Deploy to staging
        run: |
          echo "🚀 Deploying to staging environment..."
          # 实际的部署命令
          
      - name: Smoke test
        run: |
          curl -f https://staging.example.com/health || exit 1
          
      - name: Notify success
        run: |
          echo "✅ All CI Gates Passed - Ready for production deployment"
